name: Firmware Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLATFORMIO_CORE_VERSION: "6.1.19"
      PIO_CACHE_DIR: ${{ github.workspace }}/.platformio-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          python3 scripts/check_release_version.py --tag "${TAG}"
          CHANNEL="$(python3 scripts/firmware_metadata.py channel "${TAG}")"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "channel=${CHANNEL}" >> "${GITHUB_OUTPUT}"
          echo "manifest=manifest-${CHANNEL}.json" >> "${GITHUB_OUTPUT}"
          echo "beetle_manifest=beetle-manifest-${CHANNEL}.json" >> "${GITHUB_OUTPUT}"

      - name: Check required secrets
        shell: bash
        env:
          HMAC_SECRET_VALUE: ${{ secrets.HMAC_SECRET }}
          GLOVE_WIFI_SSID_VALUE: ${{ secrets.GLOVE_WIFI_SSID }}
          GLOVE_WIFI_PASS_VALUE: ${{ secrets.GLOVE_WIFI_PASS }}
          HAS2_LIB_TOKEN_VALUE: ${{ secrets.HAS2_LIB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${HMAC_SECRET_VALUE}" || (echo "Missing HMAC_SECRET" && exit 1)
          test -n "${GLOVE_WIFI_SSID_VALUE}" || (echo "Missing GLOVE_WIFI_SSID" && exit 1)
          test -n "${GLOVE_WIFI_PASS_VALUE}" || (echo "Missing GLOVE_WIFI_PASS" && exit 1)
          test -n "${HAS2_LIB_TOKEN_VALUE}" || (echo "Missing HAS2_LIB_TOKEN" && exit 1)

      - name: Generate secrets.h
        shell: bash
        env:
          HMAC_SECRET_VALUE: ${{ secrets.HMAC_SECRET }}
          GLOVE_WIFI_SSID_VALUE: ${{ secrets.GLOVE_WIFI_SSID }}
          GLOVE_WIFI_PASS_VALUE: ${{ secrets.GLOVE_WIFI_PASS }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib

          def c_string(name):
              value = os.environ[name]
              return value.replace("\\", "\\\\").replace('"', '\\"')

          out = pathlib.Path("secrets.h")
          out.write_text(
              "#ifndef _SECRETS_H_\n"
              "#define _SECRETS_H_\n\n"
              f"#define HMAC_SECRET \"{c_string('HMAC_SECRET_VALUE')}\"\n"
              f"#define GLOVE_WIFI_SSID \"{c_string('GLOVE_WIFI_SSID_VALUE')}\"\n"
              f"#define GLOVE_WIFI_PASS \"{c_string('GLOVE_WIFI_PASS_VALUE')}\"\n\n"
              "#endif\n",
              encoding="utf-8",
          )
          PY

      - name: Restore PlatformIO package cache
        uses: actions/cache@v4
        with:
          path: .platformio-cache
          key: pio-${{ runner.os }}-${{ env.PLATFORMIO_CORE_VERSION }}-${{ hashFiles('platformio.ini', 'Dockerfile') }}
          restore-keys: |
            pio-${{ runner.os }}-${{ env.PLATFORMIO_CORE_VERSION }}-
            pio-${{ runner.os }}-

      - name: Prepare PlatformIO cache directory
        run: mkdir -p "${PIO_CACHE_DIR}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: iotglove-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Build firmware
        shell: bash
        env:
          HAS2_LIB_TOKEN: ${{ secrets.HAS2_LIB_TOKEN }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e HAS2_LIB_TOKEN="${HAS2_LIB_TOKEN}" \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e PLATFORMIO_CORE_VERSION="${PLATFORMIO_CORE_VERSION}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -v "${PIO_CACHE_DIR}:/opt/platformio" \
            iotglove-builder \
            /bin/sh -lc 'set -eu
              git config --global --add safe.directory /work
              git config --global url."https://x-access-token:${HAS2_LIB_TOKEN}@github.com/Fuzzyline-HAS2/".insteadOf "https://github.com/Fuzzyline-HAS2/"
              pio run -e ttgo-t8-v171 -e beetle-c3-location
            '

      - name: Fix PlatformIO cache ownership
        if: always()
        shell: bash
        run: sudo chown -R "$(id -u):$(id -g)" "${PIO_CACHE_DIR}" || true

      - name: Create release artifacts
        shell: bash
        env:
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          CHANNEL: ${{ steps.release.outputs.channel }}
          TAG: ${{ steps.release.outputs.tag }}
          MANIFEST: ${{ steps.release.outputs.manifest }}
          BEETLE_MANIFEST: ${{ steps.release.outputs.beetle_manifest }}
        run: |
          set -euo pipefail
          mkdir -p dist

          cp ".pio/build/ttgo-t8-v171/firmware.bin" "dist/update.bin"
          cp ".pio/build/beetle-c3-location/firmware.bin" "dist/beetle-update.bin"

          python3 scripts/sign_firmware.py --firmware dist/update.bin --out dist/update.sig
          python3 scripts/sign_firmware.py --firmware dist/beetle-update.bin --out dist/beetle-update.sig

          python3 scripts/generate_build_info.py \
            --firmware dist/update.bin \
            --signature dist/update.sig \
            --output dist/build-info.json \
            --channel "${CHANNEL}" \
            --env ttgo-t8-v171 \
            --firmware-asset update.bin \
            --signature-asset update.sig
          python3 scripts/generate_build_info.py \
            --firmware dist/beetle-update.bin \
            --signature dist/beetle-update.sig \
            --output dist/beetle-build-info.json \
            --channel "${CHANNEL}" \
            --env beetle-c3-location \
            --firmware-asset beetle-update.bin \
            --signature-asset beetle-update.sig

          python3 scripts/make_manifest.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${TAG}" \
            --channel "${CHANNEL}" \
            --firmware dist/update.bin \
            --signature dist/update.sig \
            --build-info dist/build-info.json \
            --firmware-asset update.bin \
            --signature-asset update.sig \
            --build-info-asset build-info.json \
            --out "dist/${MANIFEST}"
          python3 scripts/make_manifest.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${TAG}" \
            --channel "${CHANNEL}" \
            --firmware dist/beetle-update.bin \
            --signature dist/beetle-update.sig \
            --build-info dist/beetle-build-info.json \
            --firmware-asset beetle-update.bin \
            --signature-asset beetle-update.sig \
            --build-info-asset beetle-build-info.json \
            --out "dist/${BEETLE_MANIFEST}"
          ls -l dist

      - name: Upload GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ steps.release.outputs.channel }}
          TAG: ${{ steps.release.outputs.tag }}
          MANIFEST: ${{ steps.release.outputs.manifest }}
          BEETLE_MANIFEST: ${{ steps.release.outputs.beetle_manifest }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            RELEASE_FLAGS=(--verify-tag --title "${TAG}" --notes "Automated firmware release ${TAG}")
            if [ "${CHANNEL}" = "prd" ]; then
              RELEASE_FLAGS+=(--latest)
            else
              RELEASE_FLAGS+=(--prerelease)
            fi
            gh release create "${TAG}" "${RELEASE_FLAGS[@]}"
          fi
          gh release upload "${TAG}" \
            dist/update.bin \
            dist/update.sig \
            "dist/${MANIFEST}" \
            dist/build-info.json \
            dist/beetle-update.bin \
            dist/beetle-update.sig \
            "dist/${BEETLE_MANIFEST}" \
            dist/beetle-build-info.json \
            --clobber

          if [ "${CHANNEL}" != "prd" ]; then
            ALIAS_TAG="${CHANNEL}-latest"
            git tag -f "${ALIAS_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${ALIAS_TAG}" --force

            if ! gh release view "${ALIAS_TAG}" >/dev/null 2>&1; then
              gh release create "${ALIAS_TAG}" \
                --verify-tag \
                --title "${ALIAS_TAG}" \
                --notes "Latest ${CHANNEL} firmware pointer. Current version: ${TAG}" \
                --prerelease
            else
              gh release edit "${ALIAS_TAG}" \
                --title "${ALIAS_TAG}" \
                --notes "Latest ${CHANNEL} firmware pointer. Current version: ${TAG}" \
                --prerelease
            fi

            gh release upload "${ALIAS_TAG}" \
              dist/update.bin \
              dist/update.sig \
              "dist/${MANIFEST}" \
              dist/build-info.json \
              dist/beetle-update.bin \
              dist/beetle-update.sig \
              "dist/${BEETLE_MANIFEST}" \
              dist/beetle-build-info.json \
              --clobber
          fi
