[platformio]
src_dir = .
include_dir = .

[env:ttgo-t8-v171]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = ttgo-t1
framework = arduino
build_type = release
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = chain+
lib_extra_dirs = lib/vendor
extra_scripts = pre:scripts/platformio_build_flags.py

build_flags =
  -I.
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/WiFi/src
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
  -D CORE_DEBUG_LEVEL=0
  -D TTGO_PIO_BUILD
  -D _IR_ENABLE_DEFAULT_=false
  -D DECODE_NEC=true
  -D SEND_NEC=true
  -D BUILD_ESP32_CORE=\"3.3.8\"
  -D BUILD_PLATFORMIO_CORE=\"6.1.19\"
  -D BUILD_PLATFORM=\"pioarduino-platform-espressif32-55.03.38\"

build_src_filter =
  -<*>
  +<updated_IoTglove_pio.cpp>
  +<SecureOTA.cpp>
  +<*.h>
  -<ArduinoBuild/>
  -<build/>
  -<logs/>
  -<nextion_tft_relay/>
  -<nextion_tft_uploader/>
  -<wifi_location/>
  -<.git/>
  -<.github/>
  -<.pio/>
  -<scripts/>

lib_deps =
  adafruit/Adafruit NeoPixel@1.15.5
  bblanchon/ArduinoJson@7.4.3
  crankyoldgit/IRremoteESP8266@2.9.0
  https://github.com/pangodream/18650CL.git#e1be2aa402bd19473aac2a843c9aeb4f274418c7

[env:beetle-c3-location]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = dfrobot_beetle_esp32c3
framework = arduino
build_type = release
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = min_spiffs.csv
board_upload.maximum_size = 1966080
lib_ldf_mode = chain+
lib_compat_mode = off

build_flags =
  -I.
  -Iwifi_location
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/WiFi/src
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
  -D CORE_DEBUG_LEVEL=0
  -D BEETLE_PIO_BUILD
  -D BUILD_ESP32_CORE=\"3.3.8\"
  -D BUILD_PLATFORMIO_CORE=\"6.1.19\"
  -D BUILD_PLATFORM=\"pioarduino-platform-espressif32-55.03.38\"

build_src_filter =
  -<*>
  +<wifi_location/wifi_location_pio.cpp>
  +<SecureOTA.cpp>
  +<SecureOTA.h>
  +<firmware_version.h>
  +<secrets.h>
  -<ArduinoBuild/>
  -<build/>
  -<logs/>
  -<nextion_tft_relay/>
  -<nextion_tft_uploader/>
  -<wifi_location/.vscode/>
  -<.git/>
  -<.github/>
  -<.pio/>
  -<scripts/>

lib_deps =
  bblanchon/ArduinoJson@7.4.3
