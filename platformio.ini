[platformio]
src_dir = .
include_dir = .

[env:ttgo-t8-v171]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38
board = esp32dev
framework = arduino
build_type = release
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = chain+
lib_extra_dirs = lib/vendor
extra_scripts = pre:scripts/platformio_build_flags.py

build_flags =
  -I.
  -D CORE_DEBUG_LEVEL=0
  -D BUILD_ESP32_CORE=\"3.3.8\"
  -D BUILD_PLATFORMIO_CORE=\"6.1.19\"
  -D BUILD_PLATFORM=\"pioarduino-platform-espressif32-55.03.38\"

build_src_filter =
  +<updated_IoTglove.ino>
  +<debug.ino>
  +<display.ino>
  +<game_state.ino>
  +<nextion_tft_upload.ino>
  +<sensor.ino>
  +<timer.ino>
  +<wifi_lowrate.ino>
  +<SecureOTA.cpp>
  +<*.h>
  -<ArduinoBuild/>
  -<build/>
  -<logs/>
  -<nextion_tft_relay/>
  -<nextion_tft_uploader/>
  -<wifi_location/>
  -<.git/>
  -<.github/>
  -<.pio/>
  -<scripts/>

lib_deps =
  adafruit/Adafruit NeoPixel@1.15.5
  bblanchon/ArduinoJson@7.4.3
  crankyoldgit/IRremoteESP8266@2.9.0
  https://github.com/pangodream/18650CL.git#e1be2aa402bd19473aac2a843c9aeb4f274418c7
  https://github.com/Fuzzyline-HAS2/HAS2_Wifi.git#v1.0.0
